###############################################################################
# SolarIntel — Render.com deployment configuration
# Single Docker web service: FastAPI serves both the API and index.html
# Docs: https://render.com/docs/render-yaml-reference
###############################################################################

services:

  - type: web
    name: solarintel
    runtime: docker
    region: oregon              # match your existing services region
    plan: free                  # upgrade to starter ($7/mo) for zero-downtime
    healthCheckPath: /healthz   # matches the /healthz alias in api.py
    envVars:
      - key: PORT
        value: "8000"
      # Uncomment and set if you have an external Ollama instance:
      # - key: OLLAMA_HOST
      #   value: http://your-ollama-host:11434
    autoDeploy: true
