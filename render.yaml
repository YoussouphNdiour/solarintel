###############################################################################
# SolarIntel — Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml-reference
###############################################################################

services:

  - type: web
    name: solarintel
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "10000"

      # ── Ollama / LLM (votre propre serveur) ──────────────────────────────
      # Remplacez la valeur par l'URL de votre serveur Ollama.
      # Exemple : http://mon-serveur.example.com:11434
      # Si vide, les recommandations IA seront générées statiquement.
      - key: OLLAMA_HOST
        value: "http://localhost:11434"

      # Modèle Ollama à utiliser (llama3, mistral, qwen2, etc.)
      - key: OLLAMA_MODEL
        value: "llama3"

    autoDeploy: true
